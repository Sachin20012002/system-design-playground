services:

  postgres:
    image: postgres:17
    container_name: postgres-url-shortener

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: redis-url-shortener

    ports:
      - "6379:6379"

  app1:
    build: .
    container_name: url-shortener-1

    depends_on:
      - postgres
      - redis

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8080:8080"

  app2:
    build: .
    container_name: url-shortener-2

    depends_on:
      - postgres
      - redis

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8081:8080"

  app3:
    build: .
    container_name: url-shortener-3

    depends_on:
      - postgres
      - redis

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8082:8080"

  nginx:
    image: nginx:latest
    container_name: nginx-url-shortener

    depends_on:
      - app1
      - app2
      - app3

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  prometheus:
    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - app1
      - app2
      - app3

  grafana:
    image: grafana/grafana:latest

    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  grafana-data:
